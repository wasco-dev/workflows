on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-wkg

      - name: Set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2
          cache-directories: "target"
          cache-all-crates: "true"

      - name: Fetch WIT dependencies
        run: |
          WKG_CONFIG_FILE="/dev/stdin" wkg wit fetch <<'EOF'
          namespace_registries.wasco-dev = "wasco.dev"
          namespace_registries.wasi = "wasi.dev"
          EOF

      - name: Build project
        run: cargo build --release --target wasm32-wasip2

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-component
          path: target/wasm32-wasip2/release/*.wasm

  publish-ghcr:
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-wkg

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-component
          path: target

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to ghcr
        run: |
          package_registry_path="${{ env.REGISTRY }}/$(sed -nE 's/package wasco-dev:([a-z0-9-]+)@([0-9]\.[0-9]\.[0-9]);/wasco-dev\/\1:\2/p' wit/world.wit)"
          if wkg oci pull "$package_registry_path" --output /dev/null 2>/dev/null; then
            echo "::error::Version already exists in registry: $package_registry_path"
            exit 1
          fi
          wkg oci push $package_registry_path target/wasm32-wasip2/release/*.wasm

  publish-azure:
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-wkg

      - name: Download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-component
          path: target

      - name: Log in to Azure registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEV_AZURE_REGISTRY }}
          username: ${{ secrets.DEV_AZURE_USERNAME }}
          password: ${{ secrets.DEV_AZURE_PASSWORD }}

      - name: Push to Azure registry
        run: |
          package_registry_path="${{ secrets.DEV_AZURE_REGISTRY }}/$(sed -nE 's/package wasco-dev:([a-z0-9-]+)@([0-9]\.[0-9]\.[0-9]);/wasco-dev\/\1:\2/p' wit/world.wit)"
          wkg oci push "$package_registry_path" target/*.wasm
