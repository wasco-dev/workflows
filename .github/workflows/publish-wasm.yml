on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip2
          cache-directories: "**/target"
          cache-all-crates: "true"

      - name: Install wkg
        run: |
          curl -fsSL https://github.com/bytecodealliance/wasm-pkg-tools/releases/download/v0.15.0/wkg-x86_64-unknown-linux-gnu -o wkg
          chmod +x wkg
          mv wkg /usr/local/bin/

      - name: Fetch WIT dependencies
        run: echo "namespace_registries.wasco-dev = \"wasco.dev\"" | WKG_CONFIG_FILE="/dev/stdin" wkg wit fetch

      - name: Build project
        run: |
          cargo build --release --target wasm32-wasip2
          mv target/wasm32-wasip2/release/*.wasm .

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to ghcr
        run: |
          package_registry_path="${{ env.REGISTRY }}/$(sed -nE 's/package wasco-dev:([a-z-]+)@([0-9]\.[0-9]\.[0-9]);/wasco-dev\/\1:\2/p' wit/world.wit)"
          wash oci push $package_registry_path *.wasm
