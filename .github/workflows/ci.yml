on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          target: wasm32-wasip2
          cache-directories: "**/target"
          cache-all-crates: "true"

      - uses: wasco-dev/workflows/.github/actions/install-wkg@main

      - name: Fetch WIT dependencies
        run: |
          WKG_CONFIG_FILE="/dev/stdin" wkg wit fetch <<'EOF'
          namespace_registries.wasco-dev = "wasco.dev"
          namespace_registries.wasi = "wasi.dev"
          EOF

      - name: "formatting-check"
        run: RUSTFLAGS="--deny warnings" cargo fmt --check

      - name: "compile-check"
        run: RUSTFLAGS="--deny warnings" cargo build --target=wasm32-wasip2

      - name: "quality-check"
        run: RUSTFLAGS="--deny warnings" cargo clippy --target=wasm32-wasip2

      - name: "test-check"
        run: RUSTFLAGS="--deny warnings" cargo test
